<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search with Seamless Power</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: radial-gradient(circle at top, rgba(145, 74, 255, 0.20), transparent 23%),
        radial-gradient(circle at 90% 35%, rgba(255, 73, 216, 0.16), transparent 20%),
        linear-gradient(180deg, #0c081b 0%, #090516 28%, #0a0819 100%);
      color: #ffffff;
    }

    .page {
      width: min(100%, 760px);
      text-align: center;
      padding: 24px;
    }

    .label {
      display: inline-block;
      font-size: 0.92rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.78;
      color: #c8a4ff;
      margin-bottom: 18px;
    }

    .heading {
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.96;
      font-weight: 800;
      letter-spacing: -0.06em;
      margin-bottom: 36px;
      background: linear-gradient(90deg, #ff6cf2, #d689ff 35%, #8f6cff);
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 60px rgba(186, 111, 255, 0.18);
    }

    .search-card {
      display: inline-flex;
      align-items: center;
      width: 100%;
      max-width: 700px;
      padding: 18px 22px;
      border-radius: 999px;
      gap: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 34px 80px rgba(0, 0, 0, 0.26), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(22px);
    }

    .search-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.22);
    }

    .search-icon svg {
      width: 20px;
      height: 20px;
      stroke: #ffffff;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.32));
    }

    .search-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      color: #ffffff;
      font-size: 1.1rem;
      background: transparent;
      line-height: 1.4;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.62);
    }

    .search-button {
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, #9f59ff 0%, #ff5cd6 100%);
      box-shadow: 0 18px 40px rgba(159, 89, 255, 0.35);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .search-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 44px rgba(159, 89, 255, 0.42);
    }

    .search-button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 560px) {
      body {
        padding: 24px;
      }

      .search-card {
        flex-direction: column;
        align-items: stretch;
        padding: 18px;
      }

      .search-icon {
        margin: 0 auto;
      }

      .search-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="label">Search with</div>
    <h1 class="heading">Seamless Power</h1>
    <form class="search-card" onsubmit="checkSpam(event)">
      <div class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" />
          <path d="M21 21L16.65 16.65" />
        </svg>
      </div>
      <input class="search-input" type="search" name="text" placeholder="Ask a question" aria-label="Ask a question" />
      <button class="search-button" type="submit" aria-label="Submit search">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14" />
          <path d="M12 5l7 7-7 7" />
        </svg>
      </button>
    </form>
    <div id="result" style="margin-top:20px; font-size:20px;"></div>
  </div>
  <script>
    function checkSpam(event) {
      event.preventDefault();

      const text = document.querySelector(".search-input").value;

      fetch(`/predict?text=${encodeURIComponent(text)}`)
        .then(response => response.text())
        .then(data => {
          document.getElementById("result").innerHTML = data;
        });
    }
  </script>
</body>
</html>
